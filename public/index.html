<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="/images/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/images/favicon-16x16.png" sizes="16x16" type="image/png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emlak Durağı | Gayrimenkul Danışmanlığı</title>
    <meta name="description"
        content="Aliağa ve İzmir genelinde satılık ve kiralık daire, villa, arsa ilanları. Emlak Durağı ile hayalinizdeki evi güvenle bulun.">
    <link rel="canonical" href="https://www.emlakduragim.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Emlak Durağı | Gayrimenkul Danışmanlığı">
    <meta property="og:description"
        content="Aliağa ve İzmir genelinde satılık ve kiralık daire, villa, arsa ilanları. Emlak Durağı ile hayalinizdeki evi güvenle bulun.">
    <meta property="og:url" content="https://www.emlakduragim.com/">
    <meta property="og:image" content="https://www.emlakduragim.com/images/icon-512.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Emlak Durağı | Gayrimenkul Danışmanlığı">
    <meta name="twitter:description"
        content="Aliağa ve İzmir genelinde satılık ve kiralık daire, villa, arsa ilanları. Emlak Durağı ile hayalinizdeki evi güvenle bulun.">
    <meta name="twitter:image" content="https://www.emlakduragim.com/images/icon-512.png">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/components.js"></script>
</head>

<body>

    <!-- ORTAK HEADER -->
    <div id="header-alani"></div>

    <!-- HERO BÖLÜMÜ -->
    <section class="hero">
        <div class="hero-content">
            <h2>Hayallerinizin Anahtarını Birlikte Bulalım.</h2>
            <p>Aliağa ve İzmir genelinde 500+ mutlu müşteri — hayalinizdeki eve giden yol burada başlıyor.</p>
        </div>
    </section>

    <!-- İLANLAR BÖLÜMÜ -->
    <section class="listings">

        <div class="listings-header">
            <h2 class="section-title">Son Eklenen İlanlar</h2>
            <div class="filter-btns">
                <button class="filter-btn active-filter" onclick="filterIlan(this, 'tumu')">Tümü</button>
                <button class="filter-btn" onclick="filterIlan(this, 'kiralik')">Kiralık</button>
                <button class="filter-btn" onclick="filterIlan(this, 'satilik')">Satılık</button>
            </div>
        </div>

        <div class="cards-container" id="cards-container">
            <!-- Kartlar JavaScript ile API'den gelecek -->
        </div>

    </section>

    <!-- ORTAK FOOTER -->
    <div id="footer-alani"></div>

    <script>
        // Sayfa yüklenince ilanları getir
        document.addEventListener('DOMContentLoaded', () => {
            ilanlariGetir('tumu');
        });

        async function ilanlariGetir(tip) {
            try {
                const url = tip === 'tumu' ? '/api/ilanlar' : `/api/ilanlar?tip=${tip}`;
                const cevap = await fetch(url);
                const ilanlar = await cevap.json();
                kartlariGoster(ilanlar);
            } catch (hata) {
                console.error('İlanlar yüklenemedi:', hata);
            }
        }

        function kartlariGoster(ilanlar) {
            const container = document.getElementById('cards-container');

            if (ilanlar.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">Bu kategoride ilan bulunamadı.</p>';
                return;
            }

            container.innerHTML = ilanlar.map(ilan => {
                const fiyatGoster = ilan.tip === 'kiralik'
                    ? `₺${ilan.fiyat.toLocaleString('tr-TR')} / ay`
                    : `₺${ilan.fiyat.toLocaleString('tr-TR')}`;

                const badgeClass = ilan.tip === 'kiralik' ? 'kiralik-badge' : 'satilik-badge';
                const badgeYazi = ilan.tip === 'kiralik' ? 'Kiralık' : 'Satılık';
                const odaBilgi = ilan.oda ? `<span>🛏 ${escapeHtml(ilan.oda)}</span>` : '';
                const anaResim = escapeHtml(ilan.resim || 'https://via.placeholder.com/400x250?text=Resim+Yok');

                return `
                   <div class="card" data-tip="${ilan.tip}" onclick="ilanDetay(${ilan.id})" style="cursor:pointer;">
                        <div class="card-img-wrap">
                            <img src="${anaResim}" alt="${escapeHtml(ilan.baslik)}" loading="lazy">
                            <span class="badge ${badgeClass}">${badgeYazi}</span>
                            <span class="tip-badge">${escapeHtml(ilan.emlak_tipi)}</span>
                        </div>
                        <div class="card-info">
                            <h3>${escapeHtml(ilan.baslik)}</h3>
                            <p class="location">📍 ${escapeHtml(ilan.konum)}</p>
                            <div class="card-details">
                                ${odaBilgi}
                                <span>📐 ${ilan.metrekare} m²</span>
                            </div>
                            <div class="card-footer">
                                <span class="price">${fiyatGoster}</span>
                                <button onclick="ilanDetay(${ilan.id})">Detay →</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterIlan(buton, tip) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
            buton.classList.add('active-filter');
            ilanlariGetir(tip);
        }

        function ilanDetay(id) {
            window.location.href = `/ilan-detay?id=${id}`;
        }
    </script>

</body>

</html>
